<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing</title>
</head>
<link rel="stylesheet" href="Styled-Component.css">
<body>
<div class="card plan">
  <h2 class="plan__title">Basic Plan</h2>
  <p class="plan__price">Free</p>
  <p class="plan__description">Perfect for individuals.</p>
  <button class="plan__button">Choose Plan</button>
</div>

<div class="card plan plan--highlighted">
  <h2 class="plan__title">Pro Plan</h2>
  <p class="plan__price">$20/month</p>
  <p class="plan__description">Great for small teams.</p>
  <button class="plan__button">Choose Plan</button>
</div>

<div class="card plan">
  <h2 class="plan__title">Enterprise Plan</h2>
  <p class="plan__price">$50/month</p>
  <p class="plan__description">Best for large organizations.</p>
  <button class="plan__button">Choose Plan</button>
</div>
</body>
</html>
